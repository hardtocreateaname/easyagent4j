easyagent:
  system-prompt: "你是EasyAgent4j的示例助手。你可以查询天气、进行数学计算和读取文件。请用中文回答。"
  max-tool-iterations: 10
  tool-execution-mode: sequential
  streaming: true
  chat-provider: zhipu
  context:
    max-messages: 50

spring:
  main:
    web-application-type: none
  ai:
    # 指定使用zhipuai模型（重要：多个starter时必须指定）
    model:
      chat: zhipuai
    zhipuai:
      api-key: ${ZHIPU_API_KEY:YOUR_API_KEY}
      chat:
        options:
          model: glm-5-turbo
          temperature: 0.7

logging:
  level:
    com.easyagent4j: INFO
