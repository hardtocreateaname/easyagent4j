server:
  port: 8080

easyagent:
  system-prompt: "你是EasyAgent4j Web API示例助手。请用中文回答问题，保持简洁友好。"
  max-tool-iterations: 10
  streaming: true
  tool-execution-mode: parallel
  chat-provider: zhipu
  context:
    max-messages: 50

spring:
  ai:
    # 指定使用zhipuai模型
    model:
      chat: zhipuai
    zhipuai:
      api-key: ${ZHIPU_API_KEY:sk-placeholder}
      chat:
        options:
          model: ${ZHIPU_MODEL:glm-5}
          temperature: 0.7

logging:
  level:
    com.easyagent4j: DEBUG
    org.springframework.ai: INFO
